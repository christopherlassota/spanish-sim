<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spanish Sim MVP</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>Spanish Conversation Gym</h1>
      <div class="row">
        <select id="scenarioSelect"></select>
        <button id="newSessionBtn">New Session</button>
      </div>
      <p id="objective" class="sub"></p>

      <section id="chat" class="chat"></section>

      <form id="composer">
        <input id="input" placeholder="Type in Spanish..." autocomplete="off" />
        <button type="submit">Send</button>
      </form>

      <div class="actions">
        <button id="feedbackBtn">Get Feedback</button>
        <button id="analyticsBtn">View Analytics</button>
      </div>

      <section id="feedback" class="feedback"></section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
